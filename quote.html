<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Devis | SORA Agency</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
scroll-behavior:smooth;
}

body{
background:#f8f8f8;
color:#222;
}

:root{
--gold:#d4af37;
--dark:#111;
--light:#fff;
}

header{
position:fixed;
top:0;
left:0;
width:100%;
padding:20px 8%;
background:rgba(17,17,17,.95);
display:flex;
justify-content:space-between;
align-items:center;
z-index:1000;
transition:0.3s;
}

.logo{
font-size:2rem;
font-weight:700;
color:var(--gold);
}

nav ul{
display:flex;
list-style:none;
gap:25px;
}

nav a{
text-decoration:none;
color:white;
font-weight:500;
transition:.3s;
}

nav a:hover,
nav a.active{
color:var(--gold);
}

.hero{
height:40vh;
background:
linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.65)),
url('https://images.unsplash.com/photo-1556761175-b413da4baf72?auto=format&fit=crop&w=1600&q=80');
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
margin-top:80px;
}

.hero h1{
font-size:4rem;
}

.section{
padding:80px 8%;
}

.section-title{
font-size:2.5rem;
text-align:center;
margin-bottom:50px;
}

.form-container{
max-width:800px;
margin:0 auto;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.1);
}

.form-group{
margin-bottom:20px;
}

.form-group label{
display:block;
margin-bottom:8px;
font-weight:500;
}

.form-group input,
.form-group select,
.form-group textarea{
width:100%;
padding:12px 15px;
border:1px solid #ddd;
border-radius:10px;
font-size:1rem;
transition:.3s;
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus{
outline:none;
border-color:var(--gold);
}

.btn-submit{
background:var(--gold);
color:black;
padding:15px 35px;
border:none;
border-radius:50px;
font-weight:600;
cursor:pointer;
width:100%;
font-size:1.1rem;
transition:.3s;
}

.btn-submit:hover{
transform:translateY(-3px);
background:#c3a030;
}

footer{
background:#111;
color:white;
text-align:center;
padding:40px;
margin-top:50px;
}

.menu-btn{
display:none;
font-size:2rem;
color:white;
cursor:pointer;
}

@media(max-width:768px){
.hero h1{
font-size:2.5rem;
}
.menu-btn{
display:block;
}
nav{
display:none;
position:absolute;
top:80px;
left:0;
width:100%;
background:#111;
padding:20px;
z-index:999;
}
nav.active{
display:block;
}
nav ul{
flex-direction:column;
align-items:center;
gap:15px;
}
header{
padding:15px 8%;
}
.form-container{
padding:25px;
}
}
</style>
</head>
<body>

<header>
<div class="logo">SORA</div>
<div class="menu-btn" onclick="toggleMenu()">☰</div>
<nav id="menu">
<ul>
<li><a href="index.html">Accueil</a></li>
<li><a href="about.html">À propos</a></li>
<li><a href="services.html">Services</a></li>
<li><a href="gallery.html">Réalisations</a></li>
<li><a href="#" class="active">Devis</a></li>
<li><a href="recruitment.html">Recrutement</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>
</nav>
</header>

<section class="hero">
<h1>Demande de devis</h1>
</section>

<section class="section">
<h2 class="section-title">Obtenez un devis personnalisé</h2>
<div class="form-container">
<form id="quoteForm">
<div class="form-group">
<label>Nom complet *</label>
<input type="text" required>
</div>
<div class="form-group">
<label>Email *</label>
<input type="email" required>
</div>
<div class="form-group">
<label>Téléphone</label>
<input type="tel">
</div>
<div class="form-group">
<label>Type d'événement *</label>
<select required>
<option value="">Sélectionnez</option>
<option>Salon professionnel</option>
<option>Conférence / Congrès</option>
<option>Gala / Soirée privée</option>
<option>Lancement de produit</option>
<option>Événement sportif</option>
</select>
</div>
<div class="form-group">
<label>Date prévisionnelle *</label>
<input type="date" required>
</div>
<div class="form-group">
<label>Nombre d'hôtesses souhaité</label>
<input type="number" value="2" min="1">
</div>
<div class="form-group">
<label>Message / Besoins spécifiques</label>
<textarea rows="4"></textarea>
</div>
<button type="submit" class="btn-submit">Envoyer la demande</button>
</form>
<div id="formResponse" style="margin-top:20px;text-align:center;color:green;"></div>
</div>
</section>

<footer>
<h3>SORA Agency</h3>
<p>Accueil • Élégance • Professionnalisme</p>
<p>© 2026 SORA Agency - Tous droits réservés.</p>
</footer>

<script>
function toggleMenu(){
document.getElementById('menu').classList.toggle('active');
}
window.addEventListener('scroll', () => {
const header = document.querySelector('header');
if(window.scrollY > 50){
header.style.background = "rgba(17,17,17,.98)";
header.style.padding = "15px 8%";
} else {
header.style.background = "rgba(17,17,17,.95)";
header.style.padding = "20px 8%";
}
});
document.getElementById('quoteForm').addEventListener('submit', function(e){
e.preventDefault();
document.getElementById('formResponse').innerHTML = "✅ Merci ! Notre équipe vous contactera sous 24h.";
this.reset();
});
</script>
</body>
</html>
